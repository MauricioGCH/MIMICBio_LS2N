# ==================================================
# BASE CONFIGURATION
# ==================================================

data_path: 'Data/Donnes/New_Data/20250624/Haut glucose (16.7mM)_1min.h5' # Data\Donnes\Old_Data\20180116-MEAPedot8-P1107-MERGE.bin # 'Data/Donnes/New_Data/20250624/Haut glucose (16.7mM)_1min.h5'
Sintetic: True           # Use synthetic data or real data
channel: [53] # 1 y 53           # Channel to process 53
sampling_rate: 10000     # Sampling rate (Hz)

## These are only for the .bin data
skip_s: 3000            # When loading the .bin that is really long and is divided by procedures each 2700s
length_s: 300           # Length, to avoid loading it all

# ==================================================
# Simulated signal CONFIGURATION
# ==================================================
amp1: 25 
amp2: 15 
h1_s1_std_div: 12
h1_s2_std_div: 8
h2_s1_std_div: 10
h2_s2_std_div: 6
noise_std: 4
# ==================================================
# GRID SEARCH PARAMETERS (accept lists)
# ==================================================

# OFFLINE
sampling_rate_DS: 5000                  # Downsampling target (Hz)
init_data: 600000                # Samples for offline initialization
n_s:  32                            # Beam width (number of sequences)
weibull_init_method: "Manual"  # "LBFGS", "Moments", "GridSearch" #,"LBFGS"

# ONLINE
theta_update: "Regular"                        # "Fast" or "Regular"
Gradient_Q: "Regular"                          # "Fast" or "Regular"
H_update: "Kalman"                # "Kalman Fast", "Kalman", "LMS"
inv : "inv"                         # "exact" or "analitical"

# ==================================================
# FIXED PARAMETERS (single values)
# ==================================================
online_s: 10                                # Seconds for online evaluation

# Manual Weibull initialization (if weibull_init_method = "Manual")
t0: [2700, 12000]                           # Initial t₀ in samples, both for signal generation and model
beta: [2, 2]                                # Initial β, both for signal generation and model

# Signal preprocessing
highpass: 10                                # High-pass filter cutoff (Hz)
notch: 50                                   # Notch filter frequency (Hz)

# Spike detection
threshold_sigma: 5                          # Threshold = sigma × this value
threshold_method: "median"                    # threshold method : median, std or percentil 
spike_min_d_ms: 15                          # Minimum distance between peaks (ms)

# MUAP extraction
window_pre_ms: 1                            # Samples before spike peak
window_post_ms: 3                           # Samples after spike peak

n_sources: 2                                # Number of sources (alpha + beta)
t_R: [1500, 5500]                           # Refractory period (samples per source), both for signal generation and model
lms_step_size: 0.01                         # Learning rate for LMS

# Output
save_figures: true                          # Save individual figures
output_dir: "experiments/test_run"          # Experiment output directory